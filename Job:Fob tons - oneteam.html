<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZStreet Production</title>
    <style>
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* 16:9 LOCKED CONTAINER */
    .slide {
        position: relative;
        width: 100vw;
        height: calc(100vw * 9 / 16);
        max-height: 100vh;
        max-width: calc(100vh * 16 / 9);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
    }

    .data-box {
        position: absolute;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #000;
        text-align: center;
    }

    .normal-font {
        font-family: 'League Spartan', sans-serif;
        font-size: 64px;
        font-weight: 900;
        letter-spacing: 1px;
    }

    .status-bar {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background-color: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 5px 10px;
        font-size: 14px;
        border-radius: 5px;
        z-index: 100;
    }

    .date-bar {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 4px 10px;
        font-size: 16px;
        border-radius: 5px;
        z-index: 100;
    }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="slide" id="slide2" style="background-image: url('https://raw.githubusercontent.com/pycodes76/ScreenCloud/main/one-team.png')">
        <div class="data-box normal-font" id="job_tons"
            style="top: 84.72%; left: 8.33%; width: 20.31%; height: 7.87%;">
        </div>

        <div class="data-box normal-font" id="fob_tons"
            style="top: 84.72%; left: 39.58%; width: 20.31%; height: 7.87%;">
        </div>

        <div class="data-box normal-font" id="total_tons"
            style="top: 84.72%; left: 70.31%; width: 21.35%; height: 7.87%;">
        </div>
    </div>
    
    <div class="date-bar" id="current-date"></div>
    <div class="status-bar">Loading data...</div>

    <script>
        const API_URL = "https://dreamfactory.superiorpaving.net:444/api/v2/auto-shopkeeper/_table/vwScoreboard_YTD";
        const API_HEADERS = {
            "X-DreamFactory-API-Key": "1d28e87659ef5e62733fe212efcf57a720e8234c1bd33d7a92e8d36c8a19e3f0",
            "Accept": "application/json",
            "Content-Type": "application/json"
        };

        function formatNumber(value) {
            if (value === null || value === undefined) return '0.00';
            const num = parseFloat(value);
            return num.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function updateStatus(message) {
            document.querySelector('.status-bar').textContent = message;
        }

        function updateCurrentDate() {
            const dateElement = document.getElementById('current-date');
            const now = new Date();
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            dateElement.textContent = now.toLocaleDateString('en-US', options);
        }

        async function fetchData() {
            updateStatus('Fetching data...');
            
            try {
                const response = await fetch(API_URL, { headers: API_HEADERS });
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                const data = await response.json();
                
                // Update data boxes
                document.getElementById('job_tons').textContent = formatNumber(data.resource[0].JobTons);
                document.getElementById('fob_tons').textContent = formatNumber(data.resource[0].FOBTons);
                document.getElementById('total_tons').textContent = formatNumber(data.resource[0].TotalTons);
                
                updateStatus(`Data updated at ${new Date().toLocaleTimeString()}`);
            } catch (error) {
                console.error('Error fetching data:', error);
                updateStatus(`Error: ${error.message} - Retrying...`);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCurrentDate();
            fetchData();
            setInterval(fetchData, 300000); // Refresh every 5 minutes
        });
    </script>
</body>
</html>
