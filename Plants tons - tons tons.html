    <script>
        const DAILY_API_URL = "https://dreamfactory.superiorpaving.net:444/api/v2/auto-shopkeeper/_table/vwScoreboard";
        const API_HEADERS = {
            "X-DreamFactory-API-Key": "1d28e87659ef5e62733fe212efcf57a720e8234c1bd33d7a92e8d36c8a19e3f0",
            "Accept": "application/json",
            "Content-Type": "application/json"
        };

        const LOCATIONS = [
            'Bealeton', 'Bull Run', 'Centreville', 'City', 'Culpeper', 
            'Fredericksburg', 'Leesburg', 'Lynchburg', 'Manassas', 
            'Salem', 'Spotsylvania', 'Strasburg', 'Warrenton','Piney_River'
        ];
        
        const FIELDS = ['JobTons', 'FOBTons', 'TotalTons'];

        function formatNumber(value) {
            if (value === null || value === undefined) return '0.00';
            const num = parseFloat(value);
            return num.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function updateStatus(message) {
            document.querySelector('.status-bar').textContent = message;
        }

        function updateCurrentDate() {
            const dateElement = document.getElementById('current-date');
            const now = new Date();
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            dateElement.textContent = now.toLocaleDateString('en-US', options);
        }

        async function fetchData() {
            updateStatus('Fetching data...');
            
            try {
                const today = new Date().toISOString().split('T')[0];
                const url = `${DAILY_API_URL}?filter=(ScoreboardDate=${today})`;
                const response = await fetch(url, { headers: API_HEADERS });
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                const data = await response.json();
                
                // Process and display data
                let totalTons = 0;
                const records = data.resource;
                
                // Create location map for quick access
                const locationMap = {};
                records.forEach(record => {
                    locationMap[record.LocationName] = record;
                });
                
                // Update each location and field
                LOCATIONS.forEach(location => {
                    const record = locationMap[location] || {};
                    
                    FIELDS.forEach(field => {
                        const elementId = `${location}_${field}`;
                        const element = document.getElementById(elementId);
                        if (element) {
                            const value = record[field] || 0;
                            element.textContent = formatNumber(value);
                            
                            // Add to total if it's a TotalTons field
                            if (field === 'TotalTons') {
                                totalTons += parseFloat(value);
                            }
                        }
                    });
                });
                
                // Update total tons
                document.getElementById('Tons').textContent = formatNumber(totalTons);
                
                updateStatus(`Data updated at ${new Date().toLocaleTimeString()}`);
            } catch (error) {
                console.error('Error fetching data:', error);
                updateStatus(`Error: ${error.message} - Retrying...`);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCurrentDate();
            fetchData();
            setInterval(fetchData, 300000); // Refresh every 5 minutes
        });
    </script>
