<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZStreet Production</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #020c7d8a;
            width: 4px;
            aspect-ratio: 1;
            border-radius: 50%;
            box-shadow: 19px 0 0 7px, 38px 0 0 3px, 57px 0 0 0;
            animation: l21 1s infinite alternate linear;
            z-index: 9999;
        }
        @keyframes l21 {
            50%  {box-shadow: 19px 0 0 3px, 38px 0 0 7px, 57px 0 0 3px}
            100% {box-shadow: 19px 0 0 0,   38px 0 0 3px, 57px 0 0 7px}
        }
        
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        .data-box {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            overflow: hidden;
            text-align: center;
            transition: opacity 0.5s ease-in-out;

        }
        
        .normal-font {
            font-size: 30px;
            font-weight: bold;
        }
        
        .status-bar {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 5px;
            z-index: 100;
        }

        .date-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 10px;
            font-size: 16px;
            border-radius: 5px;
            z-index: 100;
        }
    
        @media (max-width: 1366px) {
            .normal-font { font-size: 36px; }
        }

        @media (min-width: 1367px) and (max-width: 1920px) {
            .normal-font { font-size: 40px; }
        }

        @media (min-width: 1921px) {
            .normal-font { font-size: 50px; }
        }
    </style>
</head>
<body>
    <div class="slide" id="slide2" style="background-image: url('https://raw.githubusercontent.com/pycodes76/ScreenCloud/main/IT.png')">
        <div class="data-box normal-font" id="open" style="top: 24.07%; left: 48.70%; width: 16.41%; height: 6.48%;"></div>
        <div class="data-box normal-font" id="avgweek" style="top: 24.07%; left: 75.52%; width: 16.41%; height: 6.48%;"></div>
        <div class="data-box normal-font" id="avgresp" style="top: 41.67%; left: 48.70%; width: 16.41%; height: 6.48%;"></div>
        <div class="data-box normal-font" id="close" style="top: 41.67%; left: 75.52%; width: 16.41%; height: 6.48%;"></div>
    </div>
    
    <div class="date-bar" id="current-date"></div>
    <div class="status-bar">Loading data...</div>

<script>
    const API_URL = "https://dreamfactory.superiorpaving.net:444/api/v2/Auto-ShopKeeper/_table/tblScreenCloud";
    const API_HEADERS = {
        "X-DreamFactory-API-Key": "1d28e87659ef5e62733fe212efcf57a720e8234c1bd33d7a92e8d36c8a19e3f0",
        "Accept": "application/json",
        "Content-Type": "application/json"
    };

    function formatValue(value) {
        if (value === null || value === undefined) return '0.00';
        
        // If it's already a number, format it with 2 decimal places
        if (typeof value === 'number') {
            return value.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        // If it's a string with units, extract the number and keep the units
        const stringValue = value.toString();
        
        // Try to extract the numeric part and the unit part
        const match = stringValue.match(/([\d.]+)\s*(.*)/);
        if (match) {
            const num = parseFloat(match[1]);
            const unit = match[2] || '';
            const formattedNum = num.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            return unit ? `${formattedNum} ${unit}` : formattedNum;
        }
        
        // Fallback: return the original string
        return stringValue;
    }

    function updateStatus(message) {
        document.querySelector('.status-bar').textContent = message;
    }

    function updateCurrentDate() {
        const dateElement = document.getElementById('current-date');
        const now = new Date();
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        dateElement.textContent = now.toLocaleDateString('en-US', options);
    }

    async function fetchData() {
        updateStatus('Fetching data...');
        
        try {
            const response = await fetch(API_URL, { headers: API_HEADERS });
            if (!response.ok) throw new Error(`API error: ${response.status}`);
            const data = await response.json();
            
            // Update data boxes with formatValue instead of formatNumber
            document.getElementById('open').textContent = formatValue(data.resource[0].IT_OpenTicket);
            document.getElementById('avgweek').textContent = formatValue(data.resource[0].IT_AvgWeeklyVolume);
            document.getElementById('avgresp').textContent = formatValue(data.resource[0].IT_AvgResponseTime);
            document.getElementById('close').textContent = formatValue(data.resource[0].IT_AvgCloseTime);
            
            updateStatus(`Data updated at ${new Date().toLocaleTimeString()}`);
        } catch (error) {
            console.error('Error fetching data:', error);
            updateStatus(`Error: ${error.message} - Retrying...`);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateCurrentDate();
        fetchData();
        setInterval(fetchData, 300000); // Refresh every 5 minutes
    });
</script>
</body>
</html>
